<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
         *{
         
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Helvetica Now Dispay;


        }
        html,body{

            width: 100%;
            height: 100%;
        }
        #main{
        overflow: hidden;
            height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;

            
        }
        #mouse{
            position: absolute;
            width: 400px;
            height: 400px;
            background-color: rgb(9, 98, 20);
          border-radius: 50%;
            transition: all cubic-bezier(0.19, 1, 0.22, 1).2s;
         
            
        }
    </style>
</head>
<body>
   <div id="main">

     <div id="mouse">


    </div>
   </div>

    <script src="mouseover-and-mousemove.js"></script>
    
</body>
</html>
