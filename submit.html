<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <style>
        *{
         
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Helvetica Now Dispay;


        }
        html,body{

            width: 100%;
            height: 100%;


        }
        #main{
            padding: 50px;
            width: 100%;
            height: 100%;
            background-color: #222; 
        }
        input{
           display: block;
      
        }
        .card{
            max-width: 300px;
            margin-top: 40px;
            display: inline-block;
            padding: 20px;
            border: 2px solid #e40f0f;
            border-radius: 10px;
        
        }
        .card h3{
            margin-top:5px;
            color: aliceblue;
        }

        .card h5{
            margin-top:5px;
            color: aliceblue;
        }
        .card p{
            font-size: 12px;
            margin-top:10px;
            color: aliceblue;
        }
        .profile{
            height: 50px;
            width: 50px;
            border-radius: 50px;
            overflow: hidden;
          
        }
        .profile img{
            width: 100%;
            height: 100%;
            object-fit: cover;
        
        }

        #button{
          padding: 12px 22px;
          background-color: rgba(41, 143, 114);
          border-radius: 30px;
          color: white;
          font-weight: 600;

        }
        #button:hover{
            background-color: rgb(13, 63, 49) ;
        }

        
    </style>
</head>
<body>
    <div id="main">

         <form action="" >
             <input type="text" placeholder="profile pic">
             <input type="text" placeholder="name">
             <input type="text" placeholder="place">
             <input type="text" placeholder="about">
            
             <input type="submit">
         </form>
        </div>
   



    <script src="submit.js"></script>
</body>
</html>
